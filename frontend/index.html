<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Watermarking Tool</title>
  <style>
    :root{--bg:#0b1020;--card:#141b2d;--txt:#ecf2ff;--muted:#9eb0d1;--line:#2a3555;--pri:#5aa1ff}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(160deg,#070c1a,#0e1730);color:var(--txt);font-family:Inter,Segoe UI,Arial,sans-serif}
    .wrap{max-width:1050px;margin:26px auto;padding:0 14px}
    h1{margin:0 0 6px} .muted{color:var(--muted)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
    label{display:block;margin:.6rem 0 .35rem;color:var(--muted);font-size:14px}
    input,button,textarea,select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1528;color:var(--txt)}
    textarea{min-height:88px;resize:vertical}
    button{background:linear-gradient(135deg,#3c7cff,#5aa1ff);border:none;font-weight:700;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .thumb{width:100%;max-height:260px;object-fit:contain;border:1px dashed var(--line);border-radius:10px;background:#0a1223}
    .status{margin-top:8px;font-size:14px;color:#b8d8ff;white-space:pre-wrap}
    .ok{color:#88f1b0}.err{color:#ff9ea0}
    a{color:#9fcbff}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Digital Watermarking Tool</h1>
    <div class="muted">Demo UI: nhúng / trích xuất watermark bằng backend API.</div>

    <div class="grid">
      <section class="card">
        <h3>1) Embed watermark</h3>
        <label>Ảnh đầu vào</label>
        <input id="embedFile" type="file" accept="image/png,image/*" />
        <img id="embedPreview" class="thumb" alt="embed preview" />

        <label>Thuật toán</label>
        <select id="algoSelect">
          <option value="lsb_v2">lsb_v2 (Phase 1 - anti-crop improved)</option>
          <option value="dct_v1">dct_v1 (Phase 2 - planned)</option>
        </select>

        <label>Nội dung watermark</label>
        <textarea id="embedMsg" placeholder="Ví dụ: Rin - Copyright 2026"></textarea>

        <div class="row">
          <button id="embedBtn">Embed watermark</button>
          <a id="downloadLink" style="display:none">Download watermarked.png</a>
        </div>
        <div id="embedStatus" class="status"></div>
      </section>

      <section class="card">
        <h3>2) Extract watermark</h3>
        <label>Ảnh cần đọc watermark</label>
        <input id="extractFile" type="file" accept="image/png,image/*" />
        <img id="extractPreview" class="thumb" alt="extract preview" />

        <div class="row">
          <button id="extractBtn">Extract watermark</button>
        </div>
        <pre id="extractOut" class="status"></pre>
      </section>
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
